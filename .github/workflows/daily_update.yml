name: Daily Notion to RAG Update

on:
  schedule:
    - cron: '0 17 * * *' # 毎日午前2時 JST (17:00 UTC)
  workflow_dispatch: # 手動実行を許可

jobs:
  update-rag:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Restore index state cache
        id: cache-index-restore
        uses: actions/cache/restore@v4
        with:
          path: index_state.json
          key: index-state-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            index-state-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run update script
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
        run: python src/update.py

      - name: Save index state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: index_state.json
          key: index-state-${{ runner.os }}-${{ github.run_id }}

      - name: Commit and push last update time
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update: Record last execution time [skip ci]"
          file_pattern: 'last_update.txt'
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
          commit_author: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
